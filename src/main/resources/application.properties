# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/mmglowbeauty}
spring.data.mongodb.database=mmglowbeauty

# JWT
jwt.secret=${JWT_SECRET:mmglowbeauty-super-secret-key-2024-very-long-string}
jwt.expiration=86400000

# Email (JavaMail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio (WhatsApp)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.from.number=${TWILIO_FROM_NUMBER:}

# Notification channel: EMAIL or WHATSAPP
notificacion.canal=EMAIL

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Almacenamiento de imagenes (local | cloudinary | s3)
storage.provider=${STORAGE_PROVIDER:local}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Logging
logging.level.com.mmglowbeauty=INFO
logging.file.name=logs/mmglowbeauty.log

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
