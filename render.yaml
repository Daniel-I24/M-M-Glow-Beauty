# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mmglowbeauty-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api-docs
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: NOTIFICACION_CANAL
        value: EMAIL
      - key: CORS_ALLOWED_ORIGINS
        sync: false
